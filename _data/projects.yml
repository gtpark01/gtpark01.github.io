- title: "ML-Driven Deep-UV Antireflective Coatings"
  summary: >-
    Factorization-Machine-based binary optimization for DUV AR multilayers,
    achieving 0.6 % average reflectance on curved CaF₂ lenses
    (collaboration with KRICT).
  image: /assets/images/research-slides/research1.jpg
  tags: [optimization, antireflective, deep-uv]
  link: "/publications/"

- title: "Bayesian Thermal Emitter Design"
  summary: >-
    BOCS-DPP framework for pixelated 2D multiband selective thermal emitters,
    developed at the Shiomi lab at the University of Tokyo. Uses a Python
    RCWA (S⁴) backend with high-index dielectric Ge.
  image: /assets/images/research-slides/research2.jpg
  tags: [bayesian-optimization, rcwa, thermal-emitter]
  link: "/research/"

- title: "Microprism Films for Bifacial PV"
  summary: >-
    Wedge-shaped microprism sheets that redirect 81 % of light backward
    toward bifacial perovskite PV cells. Outdoor measurements showed a
    17 % average power-generation improvement (collaboration with Hyundai
    Motor Group).
  image: /assets/images/research-slides/research3.jpg
  tags: [photovoltaics, microprism, lighttools]
  link: "/publications/"
